<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Schengen Visa Support share card">
  <defs>
    <linearGradient id="grad" x1="0" x2="1">
      <stop offset="0" stop-color="#2563eb" />
      <stop offset="1" stop-color="#1e40af" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- background card -->
  <rect width="1200" height="630" rx="20" fill="url(#grad)" />

  <!-- subtle inner panel for content -->
  <rect x="48" y="48" width="1104" height="534" rx="14" fill="#ffffff" opacity="0.06" filter="url(#shadow)" />

  <!-- logo badge (top-right) -->
  <g transform="translate(1040, 40)">
    <rect x="0" y="0" width="120" height="120" rx="16" fill="#fff" opacity="0.12" />
    <text x="60" y="74" font-family="Inter, system-ui, -apple-system, Roboto, 'Helvetica Neue', Arial" font-size="34" font-weight="700" text-anchor="middle" fill="#fff">SV</text>
  </g>

  <g fill="#fff" font-family="Inter, system-ui, -apple-system, Roboto, 'Helvetica Neue', Arial">
    <!-- Title (wrapped manually with tspans for better rendering) -->
    <text x="84" y="170" font-size="56" font-weight="700">
      <tspan x="84" dy="0">How to Apply for Schengen Visa</tspan>
      <tspan x="84" dy="64" font-size="40">Step-by-step guide — Updated 2026</tspan>
    </text>

    <!-- Divider -->
    <rect x="84" y="260" width="1032" height="2" fill="#ffffff" opacity="0.12" />

    <!-- Description: keep short and punchy for social preview -->
    <text x="84" y="320" font-size="24" font-weight="500" opacity="0.95">
      Everything you need — documents, appointments, interviews, and tips to increase approval chances.
    </text>

    <!-- CTA / url chip -->
    <g transform="translate(84, 420)">
      <rect x="0" y="0" width="340" height="44" rx="8" fill="#ffffff" opacity="0.12" />
      <text x="20" y="30" font-size="18" fill="#fff">schengenvisasupport.com</text>
    </g>
  </g>
</svg>
